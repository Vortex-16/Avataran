version: '3.8'

services:
  # 1. Central Redis message broker
  redis:
    image: redis:alpine
    container_name: avataran-redis
    ports:
      - "6379:6379"
    restart: always

  # 2. Node Chat Server Instance 1
  chat-server-1:
    build: .
    container_name: avataran-chat-node-1
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  # 3. Node Chat Server Instance 2
  chat-server-2:
    build: .
    container_name: avataran-chat-node-2
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  # 4. Nginx reverse proxy load balancer
  nginx-load-balancer:
    image: nginx:alpine
    container_name: avataran-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - chat-server-1
      - chat-server-2
    restart: always
