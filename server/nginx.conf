events {
    worker_connections 1024;
}

http {
    upstream websocket_servers {
        # Load balance using ip_hash to route clients back to the same node for session stability
        ip_hash;
        server chat-server-1:8080;
        server chat-server-2:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://websocket_servers;
            
            # Enable Upgrade headers to support WebSocket connections
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            # Pass client header data to the upstream node servers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Set wide read/send timeouts to support long-lived socket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
